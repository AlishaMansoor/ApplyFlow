version: '3.8'
services:

frontend:
build: ./frontend
ports:
- "80:80"


backend:
build: ./backend
ports: 
- "3000:3000"
enviroment:
- MONGO_URL=${MONGO_URL}
- PORT=${PORT}
- JWT_SECRET=${JWT_SECRET}
- NODE_ENV=${NODE_ENV}
- CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
- CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
- CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
- SMTP_EMAIL=${SMTP_EMAIL}
- SMTP_PASSWORD=${SMTP_PASSWORD}

